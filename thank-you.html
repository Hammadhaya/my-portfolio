<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Thank You · Hammad Hayat</title>
  <link rel="icon" href="img/user-icon.png" type="image/png">

  <!-- Same type family as the main portfolio, with a solid system fallback -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-0: #0a0e17;
      --bg-1: #0f1626;
      --card: rgba(255, 255, 255, 0.035);
      --card-border: rgba(255, 255, 255, 0.09);
      --text: #eaf0fb;
      --muted: #98a6c0;
      --accent: #4c8dff;
      --accent-strong: #2f6fed;
      --radius-card: 22px;
      --radius-btn: 12px;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: 'Roboto', system-ui, -apple-system, 'Segoe UI', sans-serif;
      color: var(--text);
      background:
        radial-gradient(1100px 620px at 50% -8%, rgba(76, 141, 255, 0.16), transparent 60%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 62%);
      background-color: var(--bg-0);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .stage {
      position: relative;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 22px;
      overflow: hidden;
    }

    /* Soft focal glow behind the confirmation card */
    .glow {
      position: absolute;
      top: 34%;
      left: 50%;
      width: min(560px, 82vw);
      height: min(560px, 82vw);
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(76, 141, 255, 0.28), transparent 68%);
      filter: blur(30px);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      text-align: center;
      padding: clamp(34px, 5vw, 56px) clamp(24px, 5vw, 52px);
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-card);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 30px 80px rgba(3, 8, 20, 0.55);
      animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Animated success check */
    .check {
      width: 88px;
      height: 88px;
      margin: 0 auto 26px;
    }
    .check svg { width: 100%; height: 100%; overflow: visible; }
    .check__ring,
    .check__tick {
      fill: none;
      stroke: var(--accent);
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .check__ring {
      stroke-width: 4;
      stroke-dasharray: 210;
      stroke-dashoffset: 210;
      animation: draw 0.7s cubic-bezier(0.65, 0, 0.35, 1) 0.15s forwards;
      opacity: 0.9;
    }
    .check__tick {
      stroke-width: 5;
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      animation: draw 0.4s cubic-bezier(0.65, 0, 0.35, 1) 0.7s forwards;
    }

    .eyebrow {
      margin: 0 0 12px;
      font-size: 12.5px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 500;
      color: var(--accent);
      opacity: 0.9;
    }

    h1 {
      font-family: 'Ubuntu', 'Roboto', system-ui, sans-serif;
      margin: 0 0 16px;
      font-weight: 700;
      font-size: clamp(2.1rem, 6vw, 3rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
    }
    h1 .dot { color: var(--accent); }

    .lead {
      margin: 0 auto 14px;
      max-width: 42ch;
      font-size: clamp(1rem, 2.4vw, 1.12rem);
      line-height: 1.6;
      color: #cdd6e8;
    }

    .meta {
      margin: 0 auto 32px;
      max-width: 40ch;
      font-size: 0.92rem;
      line-height: 1.6;
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 13px 26px;
      border-radius: var(--radius-btn);
      font-size: 0.98rem;
      font-weight: 500;
      text-decoration: none;
      line-height: 1;
      white-space: nowrap;
      border: 1px solid transparent;
      transition: transform 0.18s ease, background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }
    .btn svg { width: 17px; height: 17px; }
    .btn:active { transform: translateY(1px) scale(0.99); }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

    .btn--primary {
      color: #ffffff;
      background: linear-gradient(180deg, var(--accent), var(--accent-strong));
      box-shadow: 0 10px 26px rgba(47, 111, 237, 0.38);
    }
    .btn--primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(47, 111, 237, 0.46);
    }

    .btn--ghost {
      color: var(--text);
      background: rgba(255, 255, 255, 0.02);
      border-color: rgba(255, 255, 255, 0.16);
    }
    .btn--ghost:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.28);
    }

    .foot {
      position: relative;
      z-index: 1;
      margin-top: 30px;
      font-size: 0.82rem;
      color: rgba(152, 166, 192, 0.7);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(22px) scale(0.985); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .card { animation: none; }
      .check__ring, .check__tick { animation: none; stroke-dashoffset: 0; }
    }

    @media (max-width: 420px) {
      .actions { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="glow" aria-hidden="true"></div>

    <section class="card" role="status" aria-live="polite">
      <div class="check" aria-hidden="true">
        <svg viewBox="0 0 72 72">
          <circle class="check__ring" cx="36" cy="36" r="33"></circle>
          <path class="check__tick" d="M22 37.5 L32 47.5 L51 26"></path>
        </svg>
      </div>

      <p class="eyebrow">Message received</p>
      <h1>Thank you<span class="dot">.</span></h1>
      <p class="lead">Your message just landed in my inbox. I'll get back to you within 24 to 48 hours.</p>
      <p class="meta">Thanks for reaching out. In the meantime, feel free to explore more of my work or connect with me directly.</p>

      <div class="actions">
        <a class="btn btn--primary" href="index.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"></path><path d="M12 19l-7-7 7-7"></path></svg>
          Back to portfolio
        </a>
        <a class="btn btn--ghost" href="https://wa.me/923117004512" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.149-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.885-9.885 9.885M20.52 3.449C18.24 1.245 15.24 0 12.045 0 5.463 0 .104 5.359.101 11.945c0 2.096.549 4.14 1.595 5.945L0 24l6.335-1.652a11.882 11.882 0 005.71 1.454h.006c6.585 0 11.946-5.359 11.949-11.945a11.821 11.821 0 00-3.487-8.413z"></path></svg>
          Chat on WhatsApp
        </a>
      </div>
    </section>

    <footer class="foot">© <span id="yr">2026</span> Hammad Hayat · Full Stack Developer</footer>
  </main>

  <script>
    // Keep the copyright year current without hardcoding it.
    document.getElementById('yr').textContent = new Date().getFullYear();
  </script>
</body>
</html>
